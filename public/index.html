<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Youz AI · by Yuzz Ofc</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">Y</div>
                    <span class="logo-text">Youz AI</span>
                </div>
                <button class="menu-btn" id="menuBtn">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
            
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i> Percakapan Baru
            </button>
            
            <div class="history-label">Riwayat</div>
            <ul class="conversation-list" id="conversationList"></ul>
            
            <div class="sidebar-footer">
                <div>v1.0 · Yuzz Ofc</div>
            </div>
        </aside>
        
        <!-- Menu Dropdown -->
        <div class="menu-dropdown" id="menuDropdown">
            <div class="menu-item" id="clearAllBtn">
                <i class="fas fa-trash-alt"></i> Hapus Semua
            </div>
            <div class="menu-item" id="aboutBtn">
                <i class="fas fa-info-circle"></i> Tentang
            </div>
        </div>
        
        <!-- Main Chat -->
        <main class="main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="hamburger-btn" id="hamburgerBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="chat-info">
                        <h2 id="chatTitle">Youz AI</h2>
                        <span class="model-badge" id="modelBadge">
                            <i class="fab fa-openai"></i> OpenAI
                        </span>
                    </div>
                </div>
                <div class="model-selector" id="modelSelector">
                    <button class="model-btn active" data-model="openai">
                        <i class="fab fa-openai"></i> OpenAI
                    </button>
                    <button class="model-btn" data-model="gemini">
                        <i class="fas fa-gem"></i> Gemini
                    </button>
                </div>
            </header>
            
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <i class="fas fa-robot"></i>
                    <h3>Youz AI</h3>
                    <p>Asisten AI buatan Yuzz Ofc</p>
                    <div class="suggestions">
                        <button class="suggestion-btn">🤖 Apa itu AI?</button>
                        <button class="suggestion-btn">✍️ Buat puisi</button>
                        <button class="suggestion-btn">💡 Tips produktif</button>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <div class="input-container">
                    <button class="attach-btn" id="attachBtn">
                        <i class="fas fa-image"></i>
                    </button>
                    <textarea id="messageInput" placeholder="Ketik pesan..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
        </main>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
