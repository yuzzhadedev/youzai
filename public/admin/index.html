<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel · Youz AI</title>
  <style>
    :root { --primary:#3b82f6; --success:#10b981; --danger:#ef4444; --bg-main:#f8fafc; --bg-card:#fff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg-main); color: var(--text); }
    .admin-page { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .admin-header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom: 20px; }
    .admin-header h1 { margin:0 0 8px; }
    .admin-header p { margin:0; color:var(--muted); }
    .admin-actions { display:flex; gap:10px; }
    .admin-btn { border:1px solid var(--border); background:var(--bg-card); color:var(--text); padding:10px 14px; border-radius:10px; cursor:pointer; text-decoration:none; }
    .admin-btn.tiny { padding:6px 10px; font-size:12px; }
    .admin-kpis { display:grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:20px; }
    .admin-kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; flex-direction:column; gap:6px; }
    .admin-kpi strong { font-size:24px; }
    .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .admin-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; }
    .admin-card.full { grid-column: 1 / -1; }
    .admin-table-wrap { max-height:360px; overflow:auto; }
    .admin-table { width:100%; border-collapse:collapse; }
    .admin-table th,.admin-table td { border-bottom:1px solid var(--border); text-align:left; padding:8px; font-size:13px; vertical-align:top; }
    .admin-list { max-height:280px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
    .admin-list-item { border:1px solid var(--border); border-radius:10px; padding:10px; background: #f8fafc; }
    .admin-status { margin-top:12px; font-size:13px; color: var(--muted); }
    .admin-status[data-state="success"] { color: var(--success); }
    .admin-status[data-state="error"] { color: var(--danger); }
    @media (max-width: 980px) { .admin-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="admin-page">
    <header class="admin-header">
      <div>
        <h1>Admin Panel Youz AI</h1>
        <p>Monitoring realtime, manajemen request premium, dan data ringkasan aplikasi.</p>
      </div>
      <div class="admin-actions">
        <button id="refreshAdminBtn" class="admin-btn" type="button">Refresh</button>
        <a href="/" class="admin-btn">Kembali</a>
      </div>
    </header>

    <section class="admin-kpis" id="adminKpis"></section>
    <section class="admin-grid">
      <article class="admin-card">
        <h2>Premium Requests (Latest)</h2>
        <div class="admin-table-wrap">
          <table class="admin-table" id="requestTable">
            <thead><tr><th>User</th><th>Method</th><th>Status</th><th>Notes</th><th>Aksi</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </article>
      <article class="admin-card">
        <h2>Premium Users</h2>
        <div class="admin-table-wrap">
          <table class="admin-table" id="premiumUserTable">
            <thead><tr><th>User Key</th><th>Status</th><th>Plan</th><th>Expired</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </article>
      <article class="admin-card full">
        <h2>Recent Chat History</h2>
        <div id="chatHistoryList" class="admin-list"></div>
      </article>
    </section>
    <p id="adminStatus" class="admin-status"></p>
  </main>

  <script>
    const adminKpis = document.getElementById('adminKpis');
    const requestTableBody = document.querySelector('#requestTable tbody');
    const premiumUserTableBody = document.querySelector('#premiumUserTable tbody');
    const chatHistoryList = document.getElementById('chatHistoryList');
    const adminStatus = document.getElementById('adminStatus');
    const refreshAdminBtn = document.getElementById('refreshAdminBtn');

    function escapeHtml(input = '') {
      return String(input).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
    function setStatus(msg, type = 'info') { adminStatus.textContent = msg; adminStatus.dataset.state = type; }

    async function loadAdminData() {
      setStatus('Memuat data admin...');
      try {
        const res = await fetch('/api/settings?scope=admin');
        const data = await res.json();
        if (!res.ok || !data?.success) throw new Error(data?.message || 'Gagal memuat data admin.');
        const overview = data.data?.overview || {};
        const items = [['Pending Requests', overview.pending_requests || 0], ['Active Premium', overview.active_premium_users || 0], ['Total Requests', overview.total_premium_requests || 0], ['Chat Logged', overview.chat_messages_logged || 0], ['Usage Rows', overview.usage_rows || 0]];
        adminKpis.innerHTML = items.map(([label, value]) => `<div class="admin-kpi"><span>${label}</span><strong>${value}</strong></div>`).join('');

        const requests = data.data?.latest_premium_requests || [];
        requestTableBody.innerHTML = requests.map((item) => {
          const userKey = item?.user_key || item?.userKey || '';
          const isPending = String(item?.status || 'pending').toLowerCase() === 'pending';
          return `<tr><td>${escapeHtml(item?.email || userKey)}</td><td>${escapeHtml(item?.method || '-')}</td><td>${escapeHtml(item?.status || 'pending')}</td><td>${escapeHtml(item?.notes || '-')}</td><td>${isPending ? `<button class="admin-btn tiny" data-approve="${escapeHtml(userKey)}">Approve 1 Bulan</button>` : '-'}</td></tr>`;
        }).join('') || '<tr><td colspan="5">Tidak ada data.</td></tr>';

        requestTableBody.querySelectorAll('button[data-approve]').forEach((btn) => btn.addEventListener('click', () => approvePremium(btn.dataset.approve)));

        const users = data.data?.premium_users || [];
        premiumUserTableBody.innerHTML = users.map((item) => `<tr><td>${escapeHtml(item?.user_key || '-')}</td><td>${escapeHtml(item?.status || '-')}</td><td>${escapeHtml(item?.plan_name || 'premium')}</td><td>${escapeHtml(item?.expires_at || '-')}</td></tr>`).join('') || '<tr><td colspan="4">Tidak ada user premium.</td></tr>';

        const history = data.data?.recent_chat_history || [];
        chatHistoryList.innerHTML = history.map((item) => `<div class="admin-list-item"><div><strong>${escapeHtml(item?.role || 'unknown')}</strong> · ${escapeHtml(item?.conversation_id || '-')}</div><p>${escapeHtml((item?.content || '').slice(0, 280) || '-')}</p></div>`).join('') || '<div class="admin-list-item">Belum ada chat history.</div>';

        setStatus('Data admin berhasil dimuat.', 'success');
      } catch (error) { setStatus(error.message || 'Terjadi kesalahan saat load data admin.', 'error'); }
    }

    async function approvePremium(targetUserKey) {
      if (!targetUserKey) return;
      setStatus(`Mengaktifkan premium untuk ${targetUserKey}...`);
      try {
        const res = await fetch('/api/settings?scope=admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'approve_premium', targetUserKey, months: 1 }) });
        const data = await res.json();
        if (!res.ok || !data?.success) throw new Error(data?.message || 'Gagal approve premium.');
        setStatus(`Premium aktif untuk ${targetUserKey}.`, 'success');
        await loadAdminData();
      } catch (error) { setStatus(error.message || 'Gagal approve premium.', 'error'); }
    }

    refreshAdminBtn?.addEventListener('click', loadAdminData);
    loadAdminData();
  </script>
</body>
</html>
